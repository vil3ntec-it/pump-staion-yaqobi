<!doctype html>
<html lang="fa" dir="rtl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#0b0f17" />
  <title>WebVault Manager — مدیریت سایت‌ها</title>
  <style>
/* ==========================================================================
   WebVault Manager — پوستهٔ تیرهٔ حرفه‌ای (Dark Admin Panel)
   ========================================================================== */
:root {
  --bg: #0b0f17;
  --bg-2: #111725;
  --panel: #151c2c;
  --panel-2: #1b2333;
  --border: #253047;
  --border-2: #2f3d59;
  --text: #e6ebf5;
  --muted: #8b97ad;
  --muted-2: #667089;
  --brand: #4f8cff;
  --brand-2: #6ba1ff;
  --green: #35c98a;
  --amber: #f5b13d;
  --red: #f2545b;
  --violet: #a274ff;
  --shadow: 0 10px 30px rgba(0, 0, 0, .35);
  --radius: 14px;
  --radius-sm: 9px;
}

* { box-sizing: border-box; }
html, body { height: 100%; }
body {
  margin: 0;
  font-family: "Vazirmatn", "Segoe UI", Tahoma, system-ui, sans-serif;
  background: radial-gradient(1200px 700px at 100% -10%, #16213a 0%, var(--bg) 55%) fixed;
  color: var(--text);
  direction: rtl;
  -webkit-font-smoothing: antialiased;
}
a { color: var(--brand-2); text-decoration: none; }
button { font-family: inherit; }
::selection { background: rgba(79, 140, 255, .35); }

/* ---- اسکرول‌بار ---- */
::-webkit-scrollbar { width: 10px; height: 10px; }
::-webkit-scrollbar-thumb { background: #29344c; border-radius: 8px; }
::-webkit-scrollbar-track { background: transparent; }

/* ============================ صفحهٔ قفل ============================ */
.lock {
  position: fixed; inset: 0; display: grid; place-items: center;
  background: radial-gradient(900px 600px at 50% -10%, #17233f 0, var(--bg) 60%);
  z-index: 50; padding: 20px;
}
.lock-card {
  width: min(420px, 100%); background: var(--panel); border: 1px solid var(--border);
  border-radius: 20px; padding: 34px 30px; box-shadow: var(--shadow); text-align: center;
}
.lock-logo {
  width: 66px; height: 66px; margin: 0 auto 14px; border-radius: 18px;
  background: linear-gradient(135deg, var(--brand), var(--violet));
  display: grid; place-items: center; font-size: 32px; box-shadow: 0 8px 24px rgba(79,140,255,.4);
}
.lock h1 { font-size: 22px; margin: 6px 0 2px; }
.lock p { color: var(--muted); font-size: 13px; margin: 0 0 22px; }
.lock input { text-align: center; letter-spacing: 2px; }

/* ============================ چیدمان کلی ============================ */
.app { display: none; grid-template-columns: 250px 1fr; min-height: 100vh; }
.app.show { display: grid; }

.sidebar {
  background: linear-gradient(180deg, var(--bg-2), var(--bg));
  border-inline-start: 1px solid var(--border);
  padding: 18px 14px; display: flex; flex-direction: column; gap: 6px;
  position: sticky; top: 0; height: 100vh;
}
.brand { display: flex; align-items: center; gap: 11px; padding: 6px 8px 18px; }
.brand .mark {
  width: 40px; height: 40px; border-radius: 12px; display: grid; place-items: center; font-size: 20px;
  background: linear-gradient(135deg, var(--brand), var(--violet)); box-shadow: 0 6px 18px rgba(79,140,255,.35);
}
.brand b { font-size: 16px; display: block; }
.brand span { font-size: 11px; color: var(--muted); }

.nav-item {
  display: flex; align-items: center; gap: 11px; padding: 10px 12px; border-radius: var(--radius-sm);
  color: var(--muted); cursor: pointer; font-size: 14px; border: 1px solid transparent; transition: .15s;
}
.nav-item:hover { background: var(--panel); color: var(--text); }
.nav-item.active { background: var(--panel-2); color: var(--text); border-color: var(--border-2); }
.nav-item .ico { width: 20px; text-align: center; font-size: 16px; }
.nav-sep { height: 1px; background: var(--border); margin: 10px 4px; }
.sidebar .spacer { flex: 1; }
.lock-btn {
  margin-top: auto; background: var(--panel); border: 1px solid var(--border); color: var(--muted);
  padding: 10px; border-radius: var(--radius-sm); cursor: pointer; font-size: 13px;
}
.lock-btn:hover { color: var(--red); border-color: var(--red); }

/* ---- محتوا ---- */
.main { min-width: 0; display: flex; flex-direction: column; }
.topbar {
  display: flex; align-items: center; gap: 14px; padding: 16px 26px;
  border-bottom: 1px solid var(--border); position: sticky; top: 0; z-index: 20;
  background: rgba(11,15,23,.75); backdrop-filter: blur(10px);
}
.topbar h2 { margin: 0; font-size: 19px; flex: 1; }
.search-box { position: relative; width: min(360px, 40vw); }
.search-box input { width: 100%; padding-inline-start: 38px; }
.search-box .ico { position: absolute; inset-inline-start: 12px; top: 50%; transform: translateY(-50%); color: var(--muted); }
.search-results {
  position: absolute; top: 46px; inset-inline: 0; background: var(--panel); border: 1px solid var(--border-2);
  border-radius: 12px; box-shadow: var(--shadow); max-height: 60vh; overflow: auto; z-index: 40; display: none;
}
.search-results.show { display: block; }
.search-group-title { font-size: 11px; color: var(--muted-2); padding: 10px 14px 4px; }
.search-row { padding: 9px 14px; cursor: pointer; font-size: 13px; display: flex; justify-content: space-between; }
.search-row:hover { background: var(--panel-2); }

.content { padding: 24px 26px 60px; }

/* ============================ اجزای پایه ============================ */
input, select, textarea {
  width: 100%; background: var(--bg-2); border: 1px solid var(--border-2); color: var(--text);
  padding: 10px 12px; border-radius: var(--radius-sm); font-size: 14px; outline: none; transition: .15s;
}
input:focus, select:focus, textarea:focus { border-color: var(--brand); box-shadow: 0 0 0 3px rgba(79,140,255,.15); }
textarea { min-height: 78px; resize: vertical; }
label { display: block; font-size: 12px; color: var(--muted); margin: 0 2px 6px; }
.field { margin-bottom: 14px; }
.grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
.grid-3 { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; }

.btn {
  display: inline-flex; align-items: center; gap: 7px; justify-content: center;
  background: var(--panel-2); border: 1px solid var(--border-2); color: var(--text);
  padding: 10px 16px; border-radius: var(--radius-sm); cursor: pointer; font-size: 14px; transition: .15s;
}
.btn:hover { border-color: var(--brand); }
.btn.primary { background: linear-gradient(135deg, var(--brand), #3f78e6); border-color: transparent; color: #fff; font-weight: 600; }
.btn.primary:hover { filter: brightness(1.08); }
.btn.danger { color: var(--red); border-color: transparent; background: rgba(242,84,91,.12); }
.btn.danger:hover { background: rgba(242,84,91,.2); }
.btn.ghost { background: transparent; border-color: var(--border); }
.btn.sm { padding: 6px 11px; font-size: 12.5px; }
.btn.icon { padding: 7px 9px; }
.btn:disabled { opacity: .5; cursor: not-allowed; }
.row-actions { display: flex; gap: 6px; justify-content: flex-end; }

/* ---- کارت‌ها و آمار ---- */
.cards { display: grid; grid-template-columns: repeat(auto-fill, minmax(190px, 1fr)); gap: 14px; margin-bottom: 22px; }
.stat {
  background: linear-gradient(160deg, var(--panel), var(--panel-2)); border: 1px solid var(--border);
  border-radius: var(--radius); padding: 16px 18px; position: relative; overflow: hidden;
}
.stat .k { font-size: 12.5px; color: var(--muted); display: flex; align-items: center; gap: 8px; }
.stat .v { font-size: 30px; font-weight: 700; margin-top: 8px; letter-spacing: .5px; }
.stat .dot { width: 9px; height: 9px; border-radius: 50%; background: var(--brand); }
.stat.green .dot { background: var(--green); } .stat.amber .dot { background: var(--amber); }
.stat.red .dot { background: var(--red); } .stat.violet .dot { background: var(--violet); }

.panel {
  background: var(--panel); border: 1px solid var(--border); border-radius: var(--radius);
  padding: 0; margin-bottom: 20px; overflow: hidden;
}
.panel-head { padding: 15px 18px; border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 10px; }
.panel-head h3 { margin: 0; font-size: 15px; flex: 1; }
.panel-body { padding: 16px 18px; }
.two-col { display: grid; grid-template-columns: 1.4fr 1fr; gap: 20px; align-items: start; }

/* ---- جدول ---- */
.table-wrap { overflow-x: auto; }
table { width: 100%; border-collapse: collapse; font-size: 13.5px; }
th, td { padding: 12px 14px; text-align: right; border-bottom: 1px solid var(--border); white-space: nowrap; }
th { color: var(--muted); font-weight: 600; font-size: 12px; background: var(--bg-2); position: sticky; top: 0; }
tbody tr:hover { background: var(--panel-2); }
td.wrap, th.wrap { white-space: normal; }
.mono { font-family: ui-monospace, "SF Mono", Menlo, monospace; direction: ltr; unicode-bidi: plaintext; }

/* ---- برچسب وضعیت و تگ ---- */
.badge { display: inline-flex; align-items: center; gap: 5px; padding: 3px 10px; border-radius: 20px; font-size: 12px; border: 1px solid transparent; }
.badge.active { background: rgba(53,201,138,.14); color: var(--green); }
.badge.sold { background: rgba(162,116,255,.16); color: var(--violet); }
.badge.developing { background: rgba(245,177,61,.16); color: var(--amber); }
.badge.archived { background: rgba(139,151,173,.16); color: var(--muted); }
.badge.paid { background: rgba(53,201,138,.14); color: var(--green); }
.badge.partial { background: rgba(245,177,61,.16); color: var(--amber); }
.badge.unpaid { background: rgba(242,84,91,.14); color: var(--red); }
.badge.ok { background: rgba(53,201,138,.14); color: var(--green); }
.badge.failed { background: rgba(242,84,91,.14); color: var(--red); }
.tag { display: inline-block; background: var(--panel-2); border: 1px solid var(--border-2); color: var(--muted);
  padding: 2px 9px; border-radius: 20px; font-size: 11.5px; margin: 2px; }
.tag.on { background: rgba(79,140,255,.16); color: var(--brand-2); border-color: transparent; cursor: pointer; }

.expiry-danger { color: var(--red); font-weight: 600; }
.expiry-warn { color: var(--amber); }

/* ---- هشدارها ---- */
.alert { display: flex; gap: 10px; align-items: center; padding: 11px 14px; border-radius: var(--radius-sm); margin-bottom: 9px; font-size: 13px; }
.alert.danger { background: rgba(242,84,91,.1); border: 1px solid rgba(242,84,91,.3); }
.alert.warning { background: rgba(245,177,61,.1); border: 1px solid rgba(245,177,61,.3); }
.alert.info { background: rgba(79,140,255,.1); border: 1px solid rgba(79,140,255,.3); }
.empty { text-align: center; color: var(--muted); padding: 40px 20px; font-size: 14px; }
.empty .big { font-size: 40px; margin-bottom: 10px; opacity: .6; }

/* ---- مودال ---- */
.modal-back { position: fixed; inset: 0; background: rgba(4,7,12,.66); backdrop-filter: blur(3px); z-index: 60;
  display: none; align-items: flex-start; justify-content: center; padding: 40px 16px; overflow: auto; }
.modal-back.show { display: flex; }
.modal { width: min(680px, 100%); background: var(--panel); border: 1px solid var(--border-2);
  border-radius: 16px; box-shadow: var(--shadow); animation: pop .16s ease; }
.modal.wide { width: min(920px, 100%); }
@keyframes pop { from { transform: translateY(-8px) scale(.98); opacity: 0; } }
.modal-head { padding: 16px 20px; border-bottom: 1px solid var(--border); display: flex; align-items: center; }
.modal-head h3 { margin: 0; font-size: 16px; flex: 1; }
.modal-body { padding: 20px; max-height: 68vh; overflow: auto; }
.modal-foot { padding: 14px 20px; border-top: 1px solid var(--border); display: flex; gap: 10px; justify-content: flex-start; }
.close-x { background: none; border: none; color: var(--muted); font-size: 22px; cursor: pointer; line-height: 1; }
.section-title { font-size: 12px; color: var(--brand-2); margin: 18px 2px 10px; padding-top: 6px; border-top: 1px dashed var(--border); }
.section-title:first-child { border-top: none; padding-top: 0; margin-top: 0; }

/* ---- تولستیپ رمز ---- */
.pw-row { display: flex; gap: 8px; }
.pw-row input { flex: 1; }

/* ---- توست ---- */
.toasts { position: fixed; bottom: 22px; inset-inline-start: 22px; z-index: 90; display: flex; flex-direction: column; gap: 10px; }
.toast { background: var(--panel-2); border: 1px solid var(--border-2); border-radius: 10px; padding: 12px 16px;
  font-size: 13px; box-shadow: var(--shadow); animation: pop .16s ease; min-width: 220px; }
.toast.ok { border-inline-start: 3px solid var(--green); }
.toast.err { border-inline-start: 3px solid var(--red); }

/* ---- ریسپانسیو ---- */
@media (max-width: 860px) {
  .app { grid-template-columns: 1fr; }
  .sidebar { position: fixed; inset-inline-start: -260px; width: 250px; z-index: 70; transition: .2s; box-shadow: var(--shadow); }
  .sidebar.open { inset-inline-start: 0; }
  .two-col { grid-template-columns: 1fr; }
  .grid-2, .grid-3 { grid-template-columns: 1fr; }
  .menu-toggle { display: inline-flex !important; }
}
.menu-toggle { display: none; }

</style>
</head>
<body>
  <!-- صفحهٔ قفل / ورود -->
  <div class="lock" id="lockScreen">
    <div class="lock-card">
      <div class="lock-logo">🔐</div>
      <h1>WebVault Manager</h1>
      <p id="lockSubtitle">در حال بارگذاری…</p>
      <form id="lockForm" autocomplete="off">
        <div class="field" id="serverField" style="display:none">
          <input type="text" id="serverUrl" placeholder="http://192.168.1.20:4600" style="direction:ltr;text-align:center;letter-spacing:0" />
        </div>
        <div class="field">
          <input type="password" id="masterPass" placeholder="رمز اصلی" autocomplete="off" />
        </div>
        <div class="field" id="confirmField" style="display:none">
          <input type="password" id="masterPass2" placeholder="تکرار رمز اصلی" autocomplete="off" />
        </div>
        <button class="btn primary" type="submit" id="lockBtn" style="width:100%">باز کردن</button>
      </form>
      <p id="lockError" style="color:var(--red);min-height:18px;margin-top:12px"></p>
    </div>
  </div>

  <!-- برنامهٔ اصلی -->
  <div class="app" id="app">
    <aside class="sidebar" id="sidebar">
      <div class="brand">
        <div class="mark">🔐</div>
        <div><b>WebVault</b><span>مدیریت سایت‌ها</span></div>
      </div>
      <div class="nav-item" data-route="dashboard"><span class="ico">📊</span> داشبورد</div>
      <div class="nav-item" data-route="websites"><span class="ico">🌐</span> سایت‌ها</div>
      <div class="nav-item" data-route="domains"><span class="ico">🔗</span> دامنه‌ها</div>
      <div class="nav-item" data-route="servers"><span class="ico">🖥️</span> سرورها</div>
      <div class="nav-item" data-route="passwords"><span class="ico">🗝️</span> رمزها</div>
      <div class="nav-item" data-route="backups"><span class="ico">💾</span> بکاپ‌ها</div>
      <div class="nav-item" data-route="clients"><span class="ico">👤</span> مشتری‌ها</div>
      <div class="nav-item" data-route="files"><span class="ico">📁</span> فایل‌ها</div>
      <div class="nav-sep"></div>
      <div class="nav-item" data-route="settings"><span class="ico">⚙️</span> تنظیمات</div>
      <div class="spacer"></div>
      <button class="lock-btn" id="lockNowBtn">🔒 قفل کردن برنامه</button>
    </aside>

    <div class="main">
      <div class="topbar">
        <button class="btn icon menu-toggle" id="menuToggle">☰</button>
        <h2 id="pageTitle">داشبورد</h2>
        <div class="search-box">
          <span class="ico">🔍</span>
          <input type="search" id="globalSearch" placeholder="جستجو در سایت‌ها، دامنه‌ها، مشتری‌ها…" autocomplete="off" />
          <div class="search-results" id="searchResults"></div>
        </div>
      </div>
      <div class="content" id="content"></div>
    </div>
  </div>

  <!-- مودال -->
  <div class="modal-back" id="modalBack">
    <div class="modal" id="modal"></div>
  </div>

  <div class="toasts" id="toasts"></div>

  <script type="module">
// ============================================================================
//  WebVault Manager — رابط کاربری (SPA بدون فریم‌ورک، بدون بیلد)
// ============================================================================

// --------------------------- وضعیت و ابزار پایه ---------------------------
const state = {
  token: sessionStorage.getItem('wv_token') || '',
  autoLockMin: 15,
  route: 'dashboard',
  tagFilter: null,
};

// --- حالت تک‌فایل: آدرس سرور قابل‌تنظیم (وقتی فایل مستقیم باز می‌شود) ---
let API_BASE = localStorage.getItem('wv_api_base') || '';


const $ = (s, r = document) => r.querySelector(s);
const $$ = (s, r = document) => [...r.querySelectorAll(s)];
const esc = (s) => String(s ?? '').replace(/[&<>"']/g, (c) => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c]));
const money = (n) => (n == null || n === '' ? '—' : Number(n).toLocaleString('fa-IR') + ' تومان');
const fmtDate = (d) => (!d ? '—' : new Date(d).toLocaleDateString('fa-IR'));

const STATUS = { active: 'فعال', sold: 'فروخته‌شده', developing: 'در حال توسعه', archived: 'آرشیو' };
const PAYSTATUS = { unpaid: 'پرداخت‌نشده', partial: 'بخشی', paid: 'پرداخت‌شده' };
const CREDTYPE = { password: 'رمز عبور', ssh: 'SSH Key', api: 'API Key', ftp: 'FTP', db: 'رمز دیتابیس', admin: 'ورود ادمین' };
const FILECATS = { Contracts: 'قراردادها', Documents: 'مدارک', Images: 'تصاویر', Credentials: 'دسترسی‌ها', Backup: 'بکاپ' };

// --------------------------- API ---------------------------
async function api(method, path, body, opts = {}) {
  const headers = { ...(state.token ? { Authorization: `Bearer ${state.token}` } : {}) };
  let payload = body;
  if (body && !opts.raw) { headers['Content-Type'] = 'application/json'; payload = JSON.stringify(body); }
  const res = await fetch(API_BASE + '/api' + path, { method, headers, body: payload });
  if (res.status === 401) { doLock(true); throw new Error('نشست منقضی شد — دوباره وارد شوید'); }
  const ct = res.headers.get('content-type') || '';
  const data = ct.includes('application/json') ? await res.json() : await res.text();
  if (!res.ok) throw new Error((data && data.error) || 'خطای سرور');
  resetAutoLock();
  return data;
}
const GET = (p) => api('GET', p);
const POST = (p, b) => api('POST', p, b);
const PUT = (p, b) => api('PUT', p, b);
const DEL = (p) => api('DELETE', p);

// --------------------------- توست ---------------------------
function toast(msg, kind = 'ok') {
  const t = document.createElement('div');
  t.className = `toast ${kind}`;
  t.textContent = msg;
  $('#toasts').appendChild(t);
  setTimeout(() => { t.style.opacity = '0'; setTimeout(() => t.remove(), 300); }, 2800);
}

// --------------------------- قفل خودکار ---------------------------
let lockTimer = null;
function resetAutoLock() {
  if (!state.token) return;
  clearTimeout(lockTimer);
  lockTimer = setTimeout(() => doLock(false, 'به‌دلیل بی‌فعالیتی قفل شد'), state.autoLockMin * 60 * 1000);
}
['click', 'keydown', 'mousemove', 'touchstart'].forEach((e) =>
  document.addEventListener(e, () => { if (state.token) resetAutoLock(); }, { passive: true }));

// --------------------------- صفحهٔ قفل ---------------------------
let isSetup = false;
async function initLock() {
  try {
    const st = await GET('/status');
    state.autoLockMin = st.autoLockMinutes || 15;
    isSetup = !st.initialized;
    $('#serverField').style.display = 'none';
    $('#masterPass').style.display = 'block';
    $('#lockSubtitle').textContent = isSetup
      ? 'برای شروع، یک «رمز اصلی» قوی تعیین کنید'
      : 'برای دسترسی، رمز اصلی را وارد کنید';
    $('#confirmField').style.display = isSetup ? 'block' : 'none';
    $('#lockBtn').textContent = isSetup ? 'ساخت صندوق' : 'باز کردن';
  } catch {
    // اتصال برقرار نشد → آدرس سرور را بپرس
    $('#serverField').style.display = 'block';
    $('#serverUrl').value = API_BASE || 'http://192.168.1.20:4600';
    $('#masterPass').style.display = 'none';
    $('#confirmField').style.display = 'none';
    $('#lockSubtitle').textContent = 'ابتدا آدرس سرور خانگی خود را وارد کنید';
    $('#lockBtn').textContent = 'اتصال به سرور';
  }
}

$('#lockForm').addEventListener('submit', async (e) => {
  e.preventDefault();
  $('#lockError').textContent = '';
  // حالت تک‌فایل: مرحلهٔ اتصال به سرور
  if ($('#serverField').style.display !== 'none') {
    const u = $('#serverUrl').value.trim().replace(/\/+$/, '');
    if (!/^https?:\/\//.test(u)) { $('#lockError').textContent = 'آدرس باید با http:// شروع شود'; return; }
    API_BASE = u; localStorage.setItem('wv_api_base', u);
    await initLock();
    if ($('#serverField').style.display !== 'none') $('#lockError').textContent = 'اتصال برقرار نشد — آدرس و روشن‌بودن سرور را بررسی کنید';
    else setTimeout(() => $('#masterPass').focus(), 50);
    return;
  }
  const pass = $('#masterPass').value;
  if (isSetup && pass !== $('#masterPass2').value) { $('#lockError').textContent = 'دو رمز یکسان نیستند'; return; }
  try {
    const r = isSetup ? await POST('/setup', { password: pass }) : await POST('/unlock', { password: pass });
    state.token = r.token;
    state.autoLockMin = r.autoLockMinutes || 15;
    sessionStorage.setItem('wv_token', state.token);
    $('#masterPass').value = ''; $('#masterPass2').value = '';
    enterApp();
  } catch (err) {
    $('#lockError').textContent = err.message;
  }
});

async function doLock(silent, msg) {

function closeModal() { $('#modalBack').classList.remove('show'); $('#modal').innerHTML = ''; }

function openModal(title, bodyHtml, { wide, footer } = {}) {
  $('#modal').className = 'modal' + (wide ? ' wide' : '');
  $('#modal').innerHTML = `
    <div class="modal-head"><h3>${esc(title)}</h3><button class="close-x" data-x>×</button></div>

    ${footer ? `<div class="modal-foot">${footer}</div>` : ''}`;
  $('#modalBack').classList.add('show');
  $('#modal [data-x]').addEventListener('click', closeModal);
}

// spec: [{name,label,type,options,section,placeholder,full,value}]
function formHtml(fields, data = {}) {
  let html = '';
  let openGrid = false;
  const closeGrid = () => { if (openGrid) { html += '</div>'; openGrid = false; } };
  for (const f of fields) {
    if (f.section) { closeGrid(); html += `<div class="section-title">${esc(f.section)}</div>`; continue; }
    const val = data[f.name] ?? f.value ?? '';
    let input;
    if (f.type === 'select') {
      input = `<select name="${f.name}">${f.options.map((o) => `<option value="${esc(o.v)}" ${String(val) === String(o.v) ? 'selected' : ''}>${esc(o.t)}</option>`).join('')}</select>`;
    } else if (f.type === 'textarea') {
      input = `<textarea name="${f.name}" placeholder="${esc(f.placeholder || '')}">${esc(val)}</textarea>`;
    } else if (f.type === 'password') {
      input = `<div class="pw-row"><input type="text" name="${f.name}" value="${esc(val)}" placeholder="${esc(f.placeholder || '')}" class="mono" />
        <button type="button" class="btn sm ghost" data-gen="${f.name}">تولید</button></div>`;
    } else {
      input = `<input type="${f.type || 'text'}" name="${f.name}" value="${esc(val)}" placeholder="${esc(f.placeholder || '')}" ${f.type === 'number' ? 'step="any"' : ''} ${f.mono ? 'class="mono"' : ''} />`;
    }
    const field = `<div class="field"><label>${esc(f.label)}</label>${input}</div>`;
    if (f.full) { closeGrid(); html += field; }
    else { if (!openGrid) { html += '<div class="grid-2">'; openGrid = true; } html += field; }
  }
  closeGrid();
  return html;
}

function readForm(fields) {
  const out = {};
  for (const f of fields) {
    if (f.section) continue;
    const elm = $(`[name="${f.name}"]`, $('#modal'));
    if (!elm) continue;
    let v = elm.value.trim();
    if (f.type === 'number') v = v === '' ? null : Number(v);
    // انتخاب خالی (مثل «بدون مشتری») باید null باشد تا کلید خارجی نقض نشود
    else if (f.type === 'select' && v === '') v = null;
    out[f.name] = v;
  }
  return out;
}

// فرم استاندارد ساخت/ویرایش
function entityForm({ title, fields, data = {}, onSave, wide }) {

// تشخیص این‌که یک سایتِ کشف‌شده قبلاً در دفتر ثبت شده یا نه (بر اساس نام یا آدرس)
function buildKnownSet(existing) {
  const known = new Set();
  (existing || []).forEach((w) => {
    if (w.name) known.add(String(w.name).trim().toLowerCase());
    if (w.url) known.add(String(w.url).trim().toLowerCase());
  });
  return known;
}
const isKnownSite = (s, known) =>
  known.has(String(s.name || '').trim().toLowerCase()) ||
  (s.url && known.has(String(s.url).trim().toLowerCase()));

// کشف خودکار هنگام ورود: خودِ برنامه سرور را اسکن می‌کند و اگر سایت تازه‌ای
// روی همین کامپیوتر پیدا شد، پنجرهٔ کشف را خودکار می‌آورد (یک‌بار در هر نشست).
async function autoDiscoverOnLogin() {
  if (sessionStorage.getItem('wv_auto_discovered')) return;
  sessionStorage.setItem('wv_auto_discovered', '1');
  try {
    const [data, existing] = await Promise.all([GET('/discover/sites'), GET('/websites')]);
    if (!data.sites || !data.sites.length) return;
    const known = buildKnownSet(existing);
    const fresh = data.sites.filter((s) => !isKnownSite(s, known));
    if (!fresh.length) return;
    toast(`🔍 ${fresh.length.toLocaleString('fa-IR')} سایت تازه روی این سرور پیدا شد`);
    discoverSitesModal();
  } catch { /* اتصال/دسترسی نبود → بی‌صدا رد شو */ }
}

// کشف خودکار سایت‌های میزبانی‌شده روی سرور و افزودن آن‌ها
async function discoverSitesModal(customPath) {
  openModal('🔍 کشف خودکار سایت‌های سرور', '<div class="empty"><div class="big">⏳</div>در حال اسکن سرور…</div>', { wide: true });

  try {

      GET('/websites'),
    ]);
  } catch (e) { $('#modal .modal-body').innerHTML = `<div class="empty"><div class="big">⚠️</div>${esc(e.message)}</div>`; return; }

  const known = buildKnownSet(existing);
  const freshCount = data.sites.filter((s) => !isKnownSite(s, known)).length;

  const rootsInfo = `<div style="font-size:12px;color:var(--muted);margin-bottom:12px">پلتفرم: <b>${esc(data.platform)}</b> — مسیرهای اسکن‌شده: <span class="mono">${data.scannedRoots.map(esc).join('، ')}</span></div>`;
  const pathBar = `<div class="pw-row" style="margin-bottom:14px">
    <input id="scanPath" class="mono" placeholder="مسیر دلخواه برای اسکن (اختیاری) مثل /var/www یا C:\\xampp\\htdocs" value="${esc(customPath || '')}" />
    <button class="btn sm ghost" id="rescan">اسکن این مسیر</button></div>`;

  let listHtml;
  if (!data.sites.length) {
    listHtml = `<div class="empty"><div class="big">🔍</div>در مسیرهای استاندارد سایتی پیدا نشد.<br>
      <span style="font-size:13px;color:var(--muted)">اگر سایت‌هایت جای دیگری هستند، مسیرشان را بالا وارد کن و «اسکن این مسیر» را بزن.</span></div>`;
  } else {
    listHtml = `<label style="display:flex;align-items:center;gap:8px;margin-bottom:10px;cursor:pointer">
        <input type="checkbox" id="chkAll" ${freshCount ? 'checked' : ''} style="width:auto"> <b>انتخاب سایت‌های تازه (${freshCount.toLocaleString('fa-IR')} تازه از ${data.sites.length.toLocaleString('fa-IR')} پیداشده)</b></label>
      <label style="display:flex;align-items:center;gap:8px;margin-bottom:14px;cursor:pointer;color:var(--brand-2)">
        <input type="checkbox" id="chkServer" checked style="width:auto"> این کامپیوتر را هم به‌عنوان «سرور» اضافه کن</label>
      <div class="table-wrap"><table><thead><tr><th style="width:36px"></th><th>نام</th><th>CMS</th><th>دامنه</th><th>مسیر روی سرور</th></tr></thead>
      <tbody>${data.sites.map((s, i) => { const added = isKnownSite(s, known); return `<tr style="${added ? 'opacity:.55' : ''}">
        <td><input type="checkbox" class="siteChk" data-i="${i}" data-added="${added ? 1 : 0}" ${added ? '' : 'checked'} style="width:auto"></td>
        <td><b>${esc(s.name)}</b> ${added ? '<span class="badge active" style="font-size:10px">✓ اضافه شده</span>' : '<span class="badge developing" style="font-size:10px">تازه</span>'}</td><td>${esc(s.cms)}</td>
        <td class="mono">${esc(s.domain || '—')}</td><td class="mono" style="font-size:12px">${esc(s.path || '—')}</td>
      </tr>`; }).join('')}</tbody></table></div>`;
  }

  $('#modal .modal-body').innerHTML = rootsInfo + pathBar + listHtml;
  // پاورقی با دکمه‌ها
  if (!$('#modal .modal-foot')) {
    const foot = document.createElement('div'); foot.className = 'modal-foot'; $('#modal').appendChild(foot);
  }
  $('#modal .modal-foot').innerHTML = data.sites.length
    ? `<button class="btn primary" id="doImport">➕ افزودن انتخاب‌شده‌ها</button><button class="btn ghost" data-cancel>بستن</button>`
    : `<button class="btn ghost" data-cancel>بستن</button>`;
  $('#modal [data-cancel]').addEventListener('click', closeModal);
  $('#rescan')?.addEventListener('click', () => discoverSitesModal($('#scanPath').value.trim() || undefined));
  // «انتخاب همه» فقط سایت‌های تازه را جابه‌جا می‌کند؛ ثبت‌شده‌ها دست‌نخورده می‌مانند
  $('#chkAll')?.addEventListener('change', (e) => $$('.siteChk', $('#modal')).forEach((c) => { if (c.dataset.added !== '1') c.checked = e.target.checked; }));

  $('#doImport')?.addEventListener('click', async () => {
    const chosen = $$('.siteChk', $('#modal')).filter((c) => c.checked).map((c) => data.sites[Number(c.dataset.i)]);
    if (!chosen.length) { toast('هیچ سایتی انتخاب نشده', 'err'); return; }
    const addServer = $('#chkServer')?.checked;
    let server = null;
    if (addServer) { try { server = await GET('/discover/server-info'); } catch {} }
    try {
      const r = await POST('/discover/import', { sites: chosen, addServer, server });
      closeModal();
      toast(`✅ ${r.added} سایت اضافه شد${r.skipped ? ` (${r.skipped} تکراری رد شد)` : ''}${r.addedServer ? ' + سرور' : ''}`);
      navigate('websites');
    } catch (e) { toast(e.message, 'err'); }
  });
}

async function uploadModal() {
  const websites = await GET('/websites');
  openModal('آپلود فایل', `
    <div class="field"><label>سایت مرتبط</label><select id="upW"><option value="">— عمومی —</option>${websites.map((w) => `<option value="${w.id}">${esc(w.name)}</option>`).join('')}</select></div>
    <div class="field"><label>دسته</label><select id="upC">${Object.entries(FILECATS).map(([v, t]) => `<option value="${v}">${t}</option>`).join('')}</select></div>
    <div class="field"><label>فایل</label><input type="file" id="upF" /></div>`, {
    footer: `<button class="btn primary" id="upBtn">آپلود</button><button class="btn ghost" data-cancel>انصراف</button>`,
  });
  $('#modal [data-cancel]').addEventListener('click', closeModal);
  $('#upBtn').addEventListener('click', async () => {
    const f = $('#upF').files[0];
    if (!f) { toast('فایلی انتخاب نشده', 'err'); return; }
    const w = $('#upW').value, cat = $('#upC').value;
    const qs = new URLSearchParams({ filename: f.name, category: cat, mime: f.type || 'application/octet-stream', ...(w ? { website_id: w } : {}) });
    try {
      await api('POST', '/files?' + qs.toString(), await f.arrayBuffer(), { raw: true });
      closeModal(); toast('آپلود شد'); navigate('files');
    } catch (e) { toast(e.message, 'err'); }
  });
}
PAGES.files = async function () {

  const panel = document.createElement('div'); panel.className = 'panel';
  const fmtSize = (n) => (n > 1048576 ? (n / 1048576).toFixed(1) + ' MB' : (n / 1024).toFixed(0) + ' KB');
  panel.innerHTML = list.length ? `<div class="table-wrap"><table>
    <thead><tr><th>نام فایل</th><th>سایت</th><th>دسته</th><th>حجم</th><th>تاریخ</th><th></th></tr></thead>
    <tbody>${list.map((f) => `<tr data-id="${f.id}">
      <td><b>${esc(f.filename)}</b></td><td>${esc(f.website_name || 'عمومی')}</td>
      <td>${FILECATS[f.category] || esc(f.category)}</td><td>${fmtSize(f.size)}</td><td>${fmtDate(f.uploaded_at)}</td>
      <td><div class="row-actions"><a class="btn sm ghost" href="/api/files/${f.id}/download?token=1" data-dl>⬇️ دانلود</a><button class="btn sm danger" data-del>حذف</button></div></td>
    </tr>`).join('')}</tbody></table></div>` : emptyState('فایلی آپلود نشده', '📁');
  c.appendChild(panel);

    tr.querySelector('[data-dl]')?.addEventListener('click', async (e) => {
      e.preventDefault();
      // دانلود با هدر توکن → از fetch و blob استفاده می‌کنیم
      try {
        const res = await fetch(`${API_BASE}/api/files/${id}/download`, { headers: { Authorization: `Bearer ${state.token}` } });
        if (!res.ok) throw new Error('دانلود ناموفق');
        const blob = await res.blob();
        const a = document.createElement('a'); a.href = URL.createObjectURL(blob);
        a.download = tr.querySelector('b').textContent; a.click(); URL.revokeObjectURL(a.href);
      } catch (err) { toast(err.message, 'err'); }
    });
    tr.querySelector('[data-del]')?.addEventListener('click', () => confirmDel('این فایل حذف شود؟', () => DEL('/files/' + id)));
  });
};

        <button class="btn ghost" data-exp="csv/domains">CSV دامنه‌ها</button>
        <button class="btn ghost" data-exp="csv/clients">CSV مشتری‌ها</button>
      </div>
    </div></div>

    <div class="panel"><div class="panel-head"><h3>🏷️ تگ‌ها</h3></div><div class="panel-body" id="tagCloud"></div></div>

    <div class="panel"><div class="panel-head"><h3>ℹ️ درباره</h3></div><div class="panel-body" style="color:var(--muted);font-size:13px">
      WebVault Manager نسخهٔ ۱.۱ — سرور خانگی، داده‌ها روی همین سرور و رمزنگاری‌شده با AES-256-GCM ذخیره می‌شوند. هنگام ورود، سایت‌های میزبانی‌شده روی این کامپیوتر خودکار کشف و پیشنهاد می‌شوند.
    </div></div>`;

  $('#saveLock').addEventListener('click', async () => {
    const m = Number($('#setLock').value);
    try { const r = await POST('/settings/auto-lock', { minutes: m }); state.autoLockMin = r.autoLockMinutes; resetAutoLock(); toast('ذخیره شد'); }
    catch (e) { toast(e.message, 'err'); }
  });
  $('#changePass').addEventListener('click', async () => {
    try {
      await POST('/change-master', { oldPassword: $('#oldPass').value, newPassword: $('#newPass').value });
      toast('رمز اصلی تغییر کرد'); $('#oldPass').value = ''; $('#newPass').value = '';
    } catch (e) { toast(e.message, 'err'); }
  });
  $$('[data-exp]').forEach((b) => b.addEventListener('click', async () => {
    const kind = b.dataset.exp;
    let path = kind === 'json' ? '/export/json' : kind === 'json-secrets' ? '/export/json?withSecrets=1' : '/export/' + kind;
    try {
      const res = await fetch(API_BASE + '/api' + path, { headers: { Authorization: `Bearer ${state.token}` } });
      const blob = await res.blob();
      const a = document.createElement('a'); a.href = URL.createObjectURL(blob);
      a.download = (res.headers.get('content-disposition') || '').match(/filename="?([^"]+)"?/)?.[1] || 'export';
      a.click(); URL.revokeObjectURL(a.href); toast('خروجی آماده شد');
    } catch (e) { toast(e.message, 'err'); }
  }));
  try {
    const tags = await GET('/tags');
    $('#tagCloud').innerHTML = tags.length ? tags.map((t) => `<span class="tag on">#${esc(t.name)} <b>${t.count}</b></span>`).join('') : emptyState('تگی وجود ندارد');
  } catch {}
};

// ============================================================================
//  جستجوی سراسری
// ============================================================================
let searchTimer;
$('#globalSearch').addEventListener('input', (e) => {
  clearTimeout(searchTimer);
  const q = e.target.value.trim();
  const box = $('#searchResults');
  if (!q) { box.classList.remove('show'); return; }
  searchTimer = setTimeout(async () => {
    try {
      const r = await GET('/search?q=' + encodeURIComponent(q));
      const groups = [
        ['سایت‌ها', 'websites', r.websites, (x) => x.name, 'websites'],
        ['دامنه‌ها', 'domains', r.domains, (x) => x.domain_name, 'domains'],
        ['مشتری‌ها', 'clients', r.clients, (x) => x.name, 'clients'],
        ['سرورها', 'servers', r.servers, (x) => `${x.name} (${x.ip || ''})`, 'servers'],
        ['رمزها', 'credentials', r.credentials, (x) => x.title, 'passwords'],
      ];
      let html = '';
      for (const [label, , items, fmt, route] of groups) {
        if (!items.length) continue;
        html += `<div class="search-group-title">${label}</div>`;
        html += items.map((it) => `<div class="search-row" data-route="${route}">${esc(fmt(it))}<span style="color:var(--muted-2)">${label}</span></div>`).join('');
      }
      box.innerHTML = html || `<div class="search-row">نتیجه‌ای یافت نشد</div>`;
      box.classList.add('show');
      $$('.search-row[data-route]', box).forEach((row) => row.addEventListener('click', () => {
        box.classList.remove('show'); $('#globalSearch').value = ''; navigate(row.dataset.route);
      }));
    } catch {}
  }, 250);
});
document.addEventListener('click', (e) => { if (!e.target.closest('.search-box')) $('#searchResults').classList.remove('show'); });

// ============================================================================
//  شروع
// ============================================================================
(async function boot() {
  await initLock();
  if (state.token) {
    try { await GET('/dashboard'); enterApp(); }
    catch { doLock(true); }
  }
})();

</script>
</body>
</html>
